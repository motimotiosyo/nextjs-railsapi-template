services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app_development
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
      target: dev
    ports:
      - "3001:3001"
    depends_on:
      - db

  web:
    build:
      context: ./apps/web
      target: dev
    ports:
      - "3000:3000"

volumes:
  db_data:
